      COMPANY_MANAGEMENT_HTTP_PORT: "8080"
      COMPANY_MANAGEMENT_DATABASE_URL: "postgresql://company:company@company-management-db:5432/company-management"
      COMPANY_MANAGEMENT_CLIENT_HOST: "0.0.0.0"
      COMPANY_MANAGEMENT_CLIENT_PORT: "4200"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL}"
      SEED_ADMIN_PASSWORD: ""
      ENCRYPTION_KEY: ""
      MAIL_CLIENT_HOST: "mail"
      MAIL_CLIENT_PORT: "4200"
      FACEBOOK_CLIENT_HOST: "facebook"
      FACEBOOK_CLIENT_PORT: "4200"
      FINANCE_CLIENT_HOST: "finance"
      FINANCE_CLIENT_PORT: "4200"
      KEITARO_CLIENT_HOST: "keitaro"
      KEITARO_CLIENT_PORT: "4200"
      CONTENT_CLIENT_HOST: "content"
      CONTENT_CLIENT_PORT: "4200"
      TELEGRAM_BOT_CLIENT_HOST: "telegram-bot"
      TELEGRAM_BOT_CLIENT_PORT: "4200"
      RABBIT_QUEUE_URL: "amqp://company-management:company-management@rabbitmq:5672"
    networks: *common-network
    logging: *common-logging
    labels: *common-labels-crm

  app-auth:
