x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "3"

x-common-network: &common-network
  - titan-crm-network

x-common-labels-crm: &common-labels-crm
  - dev.dozzle.group=crm

x-common-restart: &common-restart
  restart: always

services:
  frontend:
    image: ihorcrm/frontend:latest
    container_name: frontend
    <<: *common-restart
    environment:
      COMMIT_SHORT_SHA: "n/a"
      NEXT_PUBLIC_API_URL: "https://${BACKEND_DOMAIN}/api"
      NEXT_PUBLIC_APP_URL: "https://${FRONTEND_DOMAIN}/"
      NEXT_PUBLIC_FACEBOOK_AUTH_PROXY_API_URL: "https://api-facebook-auth-proxy.titan-crm.com"
      NEXT_PUBLIC_TELEGRAM_BOT_URL: "https://t.me/${TELEGRAM_BOT_NAME}"
      NEXT_PUBLIC_S3_PROTOCOL: "https"
      NEXT_PUBLIC_S3_HOSTNAME: "${AWS_S3_HOSTNAME}"
      NEXT_PUBLIC_S3_PATHNAME: "/creatives/**"
      VIRTUAL_HOST: "${FRONTEND_DOMAIN}"
      LETSENCRYPT_HOST: "${FRONTEND_DOMAIN}"
      VIRTUAL_PORT: 3000
    depends_on:
      - api-gateway
    networks: *common-network
    logging: *common-logging
    labels: *common-labels-crm

  finance:
    image: ihorcrm/finance:latest
    container_name: finance
    <<: *common-restart
