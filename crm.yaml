      FINANCE_PORT: "4200"
      FINANCE_HTTP_HOST: "0.0.0.0"
      FINANCE_HTTP_PORT: "8080"
      FINANCE_DATABASE_URL: "postgresql://finance:finance@finance-db:5432/finance"
