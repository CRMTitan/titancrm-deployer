  api-gateway:
    image: ihorcrm/api-gateway:latest
    container_name: api-gateway
    <<: *common-restart
    environment:
      COMMIT_SHORT_SHA: "n/a"
      NODE_ENV: "production"
      CORS_ORIGINS: "https://${FRONTEND_DOMAIN}"
      API_GATEWAY_HTTP_HOST: "0.0.0.0"
      API_GATEWAY_HTTP_PORT: "4200"
      APP_AUTH_CLIENT_HOST: "app-auth"
      APP_AUTH_CLIENT_PORT: "4200"
      COMPANY_MANAGEMENT_CLIENT_HOST: "company-management"
      COMPANY_MANAGEMENT_CLIENT_PORT: "4200"
      COST_MANAGEMENT_CLIENT_HOST: "cost-management"
      COST_MANAGEMENT_CLIENT_PORT: "4200"
      FINANCE_CLIENT_HOST: "finance"
      FINANCE_CLIENT_PORT: "4200"
      ANALYTICS_CLIENT_HOST: "analytics"
      ANALYTICS_CLIENT_PORT: "4200"
      CONTENT_CLIENT_HOST: "content"
      CONTENT_CLIENT_PORT: "4200"
      MAIL_CLIENT_HOST: "mail"
      MAIL_CLIENT_PORT: "4200"
      KEITARO_CLIENT_HOST: "keitaro"
      KEITARO_CLIENT_PORT: "4200"
      JWT_ACCESS_SECRET: ""
      JWT_REFRESH_SECRET: ""
      AWS_S3_REGION: "${AWS_S3_REGION}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      VIRTUAL_HOST: "${BACKEND_DOMAIN}"
      LETSENCRYPT_HOST: "${BACKEND_DOMAIN}"
      VIRTUAL_PORT: 4200
